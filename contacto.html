<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Enzo Silvero</title>
    <link rel="icon" type="image/x-icon" href="img/icono-enzo.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Enzo Silvero <span>Contacto</span></h1>
    </header>
    <nav class="navbar">
        <div class="Enzo">Enzo Silvero <span class="tag">Mixing & Mastering</span></div>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="portfolio.html">Mi Portfolio</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main class="contacto-container">

        <section class="contacto-info">
            <h2>Llevemos tu sonido al siguiente nivel🚀</h2>
        </section>
        
        <section class="contacto-form">
            <form id="form-contacto">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="Ingrese su mail" required>
                </div>
                <div class="form-group">
                    <label for="servicio">¿Qué servicio buscás?</label>
                    <select id="servicio" required>
                        <option value="" disabled selected>Seleccioná una opción</option>
                        <option value="mezcla">Mezcla Profesional</option>
                        <option value="mastering">Mastering Analógico/Digital</option>
                        <option value="full">Servicio Completo (Mezcla + Master)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="track-link">Link a la maqueta / multitracks (opcional)</label>
                    <input type="url" id="track-link" placeholder="Drive, Dropbox, Soundcloud...">
                </div>
                <button type="submit" class="btn-submit">Enviar Sesión</button>
            </form>
        </section>

    <div class="redes-box">
            <h3>Contactos directos</h3>
            <ul>
                <li><a href="#" target="_blank">📸 Instagram</a></li>
                <li><a href="mailto:soyenzosilvero@gmail.com">✉️ soyenzosilvero@gmail.com</a></li>
            </ul>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 ENZO SILVERO</p>
    </footer>
</body>
</html>
